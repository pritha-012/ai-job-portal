<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Reset</title>
    <link rel="stylesheet" href="css/style.css">
    
    
</head>
<body>
    <h2 id="stepTitle">Reset Password</h2>
    <p id="stepDesc">Enter your email to get a 6-digit code.</p>

    <form id="step1Form">
        <div>
            <label>Email Address:</label><br>
            <input type="email" id="resetEmail" required>
        </div>
        <button type="submit">Send Code</button>
    </form>

    <form id="step2Form" class="hidden">
        <div>
            <label>6-Digit OTP:</label><br>
            <input type="text" id="otpCode" required>
        </div>
        <button type="submit">Verify Code</button>
    </form>

    <form id="step3Form" class="hidden">
        <div>
            <label>New Password:</label><br>
            <input type="password" id="newPassword" required>
        </div>
        <button type="submit">Update Password</button>
    </form>

    <br>
    <a href="index.html">Back to Login</a>

    <script type="module" src="js/auth.js"></script>
</body>
</html>
